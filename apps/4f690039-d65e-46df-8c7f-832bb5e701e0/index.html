<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Insights Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">InsightFlow</div>
            <nav>
                <a href="#" class="active">ダッシュボード</a>
                <a href="#">アナリティクス</a>
                <a href="#">顧客データ</a>
                <a href="#">レポート</a>
                <a href="#">設定</a>
            </nav>
        </aside>

        <main class="content">
            <header class="top-bar">
                <h1>分析ダッシュボード</h1>
                <div class="user-profile">
                    <span class="status-dot"></span>
                    管理者アカウント
                </div>
            </header>

            <div class="kpi-grid">
                <div class="card kpi-card">
                    <span class="label">総売上 (ARR)</span>
                    <div class="value">¥42,850,000</div>
                    <span class="trend positive">+12.5% ↑</span>
                </div>
                <div class="card kpi-card">
                    <span class="label">月間定常収益 (MRR)</span>
                    <div class="value">¥3,570,000</div>
                    <span class="trend positive">+8.2% ↑</span>
                </div>
                <div class="card kpi-card">
                    <span class="label">チャーンレート</span>
                    <div class="value">1.2%</div>
                    <span class="trend negative">-0.3% ↓</span>
                </div>
                <div class="card kpi-card">
                    <span class="label">アクティブユーザー</span>
                    <div class="value">8,240</div>
                    <span class="trend positive">+15.1% ↑</span>
                </div>
            </div>

            <div class="main-grid">
                <section class="card chart-section">
                    <div class="card-header">
                        <h2>売上推移</h2>
                        <select class="time-select">
                            <option>過去6ヶ月</option>
                            <option>過去12ヶ月</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </section>

                <section class="card activity-section">
                    <div class="card-header">
                        <h2>最近のアクティビティ</h2>
                    </div>
                    <ul class="activity-list" id="activityList">
                        <!-- JSで挿入 -->
                    </ul>
                </section>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
